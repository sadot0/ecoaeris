<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="iq-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="20%" stop-color="#eee"/>
      <stop offset="50%" stop-color="#f5f5f5"/>
      <stop offset="80%" stop-color="#eee"/>
      <stop offset="100%" stop-color="#bbb"/>
    </linearGradient>
    <linearGradient id="iq-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#ddd"/>
    </linearGradient>
    <linearGradient id="iq-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A5A8F"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="iq-drop">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#00000025"/>
    </filter>
    <pattern id="iq-hex" width="12" height="10" patternUnits="userSpaceOnUse">
      <polygon points="6,0 12,3 12,7 6,10 0,7 0,3" fill="none" stroke="#00000008" stroke-width="0.8"/>
    </pattern>
    <pattern id="iq-outlet" width="100" height="6" patternUnits="userSpaceOnUse">
      <rect width="100" height="1" fill="#333"/>
    </pattern>
    <pattern id="iq-slats" width="12" height="120" patternUnits="userSpaceOnUse">
      <rect x="5" y="0" width="2" height="120" rx="1" fill="#333"/>
    </pattern>
  </defs>
  <!-- Base shadow -->
  <ellipse cx="200" cy="345" rx="75" ry="9" fill="#00000015"/>
  <!-- Main body -->
  <rect x="135" y="60" width="130" height="280" rx="14" fill="url(#iq-body)" filter="url(#iq-drop)"/>
  <!-- Top diffuser section -->
  <path d="M135 60 L135 100 Q135 110 145 112 L255 112 Q265 110 265 100 L265 60 Q265 46 251 46 L149 46 Q135 46 135 60Z" fill="url(#iq-top)"/>
  <!-- Top air outlet via pattern -->
  <rect x="145" y="50" width="110" height="55" rx="8" fill="url(#iq-hex)"/>
  <rect x="150" y="53" width="100" height="48" fill="url(#iq-outlet)" opacity="0.1"/>
  <!-- Dark blue accent band -->
  <rect x="135" y="112" width="130" height="8" fill="url(#iq-blue)" opacity="0.9"/>
  <!-- Control panel -->
  <rect x="155" y="130" width="90" height="50" rx="6" fill="#1a1a1a"/>
  <rect x="162" y="136" width="76" height="30" rx="4" fill="#0d0d0d" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="150" text-anchor="middle" fill="#4dc9f6" font-family="monospace" font-size="8">AQI</text>
  <text x="200" y="161" text-anchor="middle" fill="#1E3A5F" font-family="'Courier New',monospace" font-size="12" font-weight="bold">12 GOOD</text>
  <!-- Control buttons -->
  <circle cx="172" cy="174" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="192" cy="174" r="5" fill="#1E3A5F" opacity="0.7"/>
  <circle cx="212" cy="174" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="228" cy="174" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <!-- HEPA filter section via patterns -->
  <rect x="143" y="195" width="114" height="130" rx="8" fill="url(#iq-hex)"/>
  <rect x="143" y="195" width="114" height="130" rx="8" fill="url(#iq-slats)" opacity="0.07"/>
  <!-- HyperHEPA badge -->
  <rect x="157" y="290" width="86" height="16" rx="3" fill="#1E3A5F" opacity="0.85"/>
  <text x="200" y="301" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="7" font-weight="bold" letter-spacing="1">HyperHEPA H14</text>
  <!-- Swiss quality mark -->
  <rect x="240" y="315" width="18" height="12" rx="2" fill="#c00" opacity="0.7"/>
  <text x="249" y="324" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="7" font-weight="bold">+</text>
  <!-- Bottom accent -->
  <rect x="135" y="333" width="130" height="7" rx="3" fill="#1E3A5F" opacity="0.7"/>
  <!-- Brand text -->
  <text x="200" y="364" text-anchor="middle" fill="#1E3A5F" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3">IQAir</text>
  <text x="200" y="380" text-anchor="middle" fill="#1E3A5F" font-family="'Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="400" letter-spacing="1">HealthPro 250 NE</text>
</svg>