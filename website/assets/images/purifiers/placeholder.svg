<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="ph-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="30%" stop-color="#f0f0f0"/>
      <stop offset="70%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d5d5d5"/>
    </linearGradient>
    <pattern id="ph-vents" width="100" height="6" patternUnits="userSpaceOnUse">
      <rect width="100" height="1.5" rx="0.75" fill="#ccc"/>
    </pattern>
  </defs>
  <!-- Base shadow -->
  <ellipse cx="200" cy="330" rx="65" ry="8" fill="#00000010"/>
  <!-- Generic purifier body outline -->
  <rect x="145" y="80" width="110" height="245" rx="16" fill="url(#ph-body)" stroke="#ccc" stroke-width="1.5"/>
  <!-- Top outlet area -->
  <rect x="145" y="80" width="110" height="35" rx="16" fill="#e8e8e8"/>
  <rect x="145" y="100" width="110" height="15" fill="#e8e8e8"/>
  <!-- Outlet grille -->
  <rect x="160" y="88" width="80" height="22" fill="url(#ph-vents)" opacity="0.5"/>
  <!-- Indicator dot -->
  <circle cx="200" cy="130" r="5" fill="#bbb"/>
  <!-- Front vent area -->
  <rect x="155" y="150" width="90" height="140" rx="8" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Air flow arrows -->
  <g opacity="0.2" stroke="#999" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M200 180 L200 160 M194 166 L200 160 L206 166"/>
    <path d="M185 210 L185 190 M179 196 L185 190 L191 196"/>
    <path d="M215 210 L215 190 M209 196 L215 190 L221 196"/>
    <path d="M200 240 L200 220 M194 226 L200 220 L206 226"/>
  </g>
  <!-- Power button -->
  <circle cx="200" cy="305" r="8" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <path d="M200 299 L200 305" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="355" text-anchor="middle" fill="#aaa" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="400" letter-spacing="2">AIR PURIFIER</text>
</svg>