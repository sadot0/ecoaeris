<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="p17-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="25%" stop-color="#f2f2f2"/>
      <stop offset="75%" stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#c5c5c5"/>
    </linearGradient>
    <filter id="p17-drop">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
    <pattern id="p17-mesh-pat" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#e8e8e8"/>
      <rect x="1" y="1" width="4" height="4" rx="1" fill="#ddd"/>
    </pattern>
  </defs>
  <!-- Base shadow -->
  <ellipse cx="200" cy="340" rx="72" ry="8" fill="#00000012"/>
  <!-- Main body -->
  <rect x="138" y="80" width="124" height="255" rx="24" fill="url(#p17-body)" filter="url(#p17-drop)"/>
  <!-- Fabric/mesh front panel -->
  <rect x="145" y="140" width="110" height="160" rx="12" fill="url(#p17-mesh-pat)"/>
  <rect x="145" y="140" width="110" height="160" rx="12" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <!-- Top air outlet ring -->
  <ellipse cx="200" cy="92" rx="52" ry="12" fill="#e8e8e8" stroke="#ddd" stroke-width="1"/>
  <ellipse cx="200" cy="92" rx="38" ry="8" fill="#d4d4d4"/>
  <ellipse cx="200" cy="92" rx="22" ry="5" fill="#bbb"/>
  <!-- Blue ring indicator -->
  <rect x="138" y="120" width="124" height="4" rx="2" fill="#0B5ED7" opacity="0.8"/>
  <!-- Air quality LED -->
  <circle cx="200" cy="110" r="6" fill="#0B5ED7" opacity="0.7"/>
  <circle cx="200" cy="110" r="10" fill="#0B5ED7" opacity="0.15"/>
  <!-- Control panel -->
  <rect x="168" y="305" width="64" height="20" rx="10" fill="#eee" stroke="#ddd" stroke-width="0.5"/>
  <circle cx="182" cy="315" r="4" fill="none" stroke="#999" stroke-width="1"/>
  <circle cx="200" cy="315" r="5" fill="#0B5ED7" opacity="0.6"/>
  <circle cx="218" cy="315" r="4" fill="none" stroke="#999" stroke-width="1"/>
  <!-- On-body brand -->
  <text x="200" y="136" text-anchor="middle" fill="#0B5ED7" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8" font-weight="500" letter-spacing="1.5" opacity="0.5">PHILIPS</text>
  <!-- Brand text -->
  <text x="200" y="366" text-anchor="middle" fill="#555" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="500" letter-spacing="3">PHILIPS</text>
  <text x="200" y="382" text-anchor="middle" fill="#0B5ED7" font-family="'Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="400" letter-spacing="1">AC1715/10</text>
</svg>